<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#fff;min-height:100vh}
.topbar{background:#038387;height:48px;display:flex;align-items:center;padding:0 20px;gap:10px}
.topbar svg{width:20px;height:20px;fill:#fff}
.topbar span{color:#fff;font-size:15px;font-weight:600}
.breadcrumb{padding:12px 24px;font-size:13px;color:#605e5c;background:#faf9f8;border-bottom:1px solid #edebe9}
.breadcrumb a{color:#0078d4;text-decoration:none}
.content{max-width:600px;margin:40px auto;padding:0 24px}
.file-card{border:1px solid #e1dfdd;border-radius:6px;padding:20px;display:flex;align-items:center;gap:16px;margin-bottom:24px}
.file-thumb{width:48px;height:56px;background:#f3f2f1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#605e5c;border:1px solid #e1dfdd}
.file-meta h3{font-size:15px;color:#323130;font-weight:600}
.file-meta p{font-size:12px;color:#8a8886;margin-top:4px}
.loading-section{text-align:center;padding:24px;background:#faf9f8;border-radius:6px}
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.dots span{width:8px;height:8px;background:#038387;border-radius:50%;animation:bounce .6s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.1s}.dots span:nth-child(3){animation-delay:.2s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.load-text{font-size:13px;color:#605e5c}
.blocked{display:none;padding:16px;background:#fde7e9;border-radius:6px;color:#a80000;font-size:13px;text-align:center}
</style>
</head>
<body>
